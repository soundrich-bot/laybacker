name: Quality

# Independent code-quality + security gates:
#  - Clippy (official Rust linter), strict: zero warnings allowed
#  - cargo-audit / npm audit: dependency vulnerability checks
#  - test coverage -> Codecov
#  - SonarCloud quality grade (runs once the SONAR_TOKEN secret is added)
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  rust:
    name: Rust — lint, audit, coverage
    runs-on: ubuntu-latest
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: clippy, llvm-tools-preview

      - name: System dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Provide Linux FFmpeg sidecars (pinned to the version we ship)
        run: |
          set -euo pipefail
          # Test against the same FFmpeg the app bundles (8.1), NOT the distro's
          # apt build. Otherwise a runner-image refresh silently changes what the
          # loudness/silence tests measure against, and CI stops reflecting what
          # actually ships to users.
          curl -fL "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-n8.1-latest-linux64-gpl-8.1.tar.xz" -o /tmp/ff.tar.xz
          mkdir -p /tmp/ff
          tar xf /tmp/ff.tar.xz -C /tmp/ff --strip-components=1
          mkdir -p frontend/src-tauri/binaries
          cp /tmp/ff/bin/ffmpeg  frontend/src-tauri/binaries/ffmpeg-x86_64-unknown-linux-gnu
          cp /tmp/ff/bin/ffprobe frontend/src-tauri/binaries/ffprobe-x86_64-unknown-linux-gnu
          chmod +x frontend/src-tauri/binaries/ffmpeg-x86_64-unknown-linux-gnu \
                   frontend/src-tauri/binaries/ffprobe-x86_64-unknown-linux-gnu
          frontend/src-tauri/binaries/ffmpeg-x86_64-unknown-linux-gnu -version | head -1

      - name: Clippy (strict — no warnings allowed)
        working-directory: frontend/src-tauri
        run: cargo clippy --lib --tests -- -D warnings

      - name: Dependency security audit (cargo-audit)
        continue-on-error: true   # surface advisories without blocking
        run: |
          cargo install cargo-audit --locked
          cargo audit --file frontend/src-tauri/Cargo.lock

      - name: Test coverage (cargo-llvm-cov)
        working-directory: frontend/src-tauri
        run: |
          cargo install cargo-llvm-cov --locked
          cargo llvm-cov --lib --tests --lcov --output-path lcov.info

      - name: Upload coverage to Codecov
        continue-on-error: true
        uses: codecov/codecov-action@b9fd7d16f6d7d1b5d2bec1a2887e65ceed900238 # v4
        with:
          files: frontend/src-tauri/lcov.info
          token: ${{ secrets.CODECOV_TOKEN }}   # optional for public repos

      - name: SonarCloud scan
        if: ${{ env.SONAR_TOKEN != '' }}
        uses: SonarSource/sonarqube-scan-action@7006c4492b2e0ee0f816d36501671557c97f5995 # v8.1.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  js:
    name: Frontend — build & audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20
      - name: Install dependencies
        working-directory: frontend
        run: npm install --ignore-scripts --no-audit --no-fund
      - name: Build frontend (compile check)
        working-directory: frontend
        run: npm run build
      - name: npm audit (production dependencies)
        working-directory: frontend
        continue-on-error: true
        run: npm audit --omit=dev

  windows-check:
    # Compile the Rust on Windows so #[cfg(windows)]-only code is type-checked
    # on every push — Linux/macOS clippy compiles those branches out and can't
    # catch Windows-only breakage (which otherwise only surfaces at release).
    name: Windows — compile check
    runs-on: windows-latest
    env:
      # Guard against flaky crates.io downloads on the runner: retry hard, and
      # disable HTTP/2 multiplexing (the "Error in the HTTP2 framing layer"
      # curl failure that intermittently breaks dependency fetches).
      CARGO_NET_RETRY: "10"
      CARGO_HTTP_MULTIPLEXING: "false"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: x86_64-pc-windows-msvc
      - name: Placeholder FFmpeg sidecars (the build script only checks they exist)
        shell: bash
        run: |
          mkdir -p frontend/src-tauri/binaries
          : > frontend/src-tauri/binaries/ffmpeg-x86_64-pc-windows-msvc.exe
          : > frontend/src-tauri/binaries/ffprobe-x86_64-pc-windows-msvc.exe
      - name: cargo check (Windows target)
        working-directory: frontend/src-tauri
        run: cargo check --lib --tests
