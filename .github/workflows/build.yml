name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write       # create the release and upload checksums
  id-token: write       # OIDC token for build-provenance signing
  attestations: write   # write the provenance attestation

jobs:
  build:
    strategy:
      # Don't let one target's failure cancel the others — each platform
      # builds and publishes independently.
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
          - platform: macos-latest
            target: x86_64-apple-darwin
          - platform: windows-latest
            target: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.platform }}

    # Exposed at job level so the VirusTotal step can self-skip until the
    # VT_API_KEY secret is added (a step `if:` can read env but not secrets).
    env:
      VT_API_KEY: ${{ secrets.VT_API_KEY }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install dependencies (Ubuntu)
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install

      - name: Fetch FFmpeg sidecars (macOS)
        if: runner.os == 'macOS'
        run: bash scripts/download-ffmpeg.sh

      - name: Fetch FFmpeg sidecars (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: bash scripts/download-ffmpeg.sh --windows

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Sign the updater artifacts so the in-app updater trusts them.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: frontend
          tagName: ${{ github.ref_name }}
          releaseName: 'Laybacker ${{ github.ref_name }}'
          releaseBody: 'See the assets and notes below.'
          releaseDraft: false
          prerelease: false
          # The finalize job composes a complete latest.json across all
          # platforms (per-job updater JSON would clobber in a matrix build).
          includeUpdaterJson: false
          tauriScript: npx tauri
          args: --target ${{ matrix.target }}

      # Wrap the .app into a .pkg installer. An unsigned .pkg gets the standard
      # "unidentified developer" Gatekeeper prompt (recoverable via System
      # Settings → Open Anyway) instead of the harsh "damaged" error that a
      # downloaded .app/.dmg triggers on Apple Silicon. A pkg-installed app also
      # lands without the quarantine flag, so it launches cleanly thereafter.
      - name: Build .pkg installer (macOS)
        if: runner.os == 'macOS'
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          MACOS_DIR="frontend/src-tauri/target/${{ matrix.target }}/release/bundle/macos"
          APP=$(find "$MACOS_DIR" -maxdepth 1 -name '*.app' | head -1)
          VER="${GITHUB_REF_NAME#v}"
          case "${{ matrix.target }}" in
            aarch64-apple-darwin) ARCH=aarch64 ;;
            x86_64-apple-darwin)  ARCH=x64 ;;
            *)                    ARCH="${{ matrix.target }}" ;;
          esac
          PKG="$MACOS_DIR/Laybacker_${VER}_${ARCH}.pkg"
          productbuild --component "$APP" /Applications "$PKG"
          ls -lh "$PKG"
          gh release upload "${{ github.ref_name }}" "$PKG" --clobber

      # ── Independent trust artifacts ──────────────────────────────────────
      # Publish SHA-256 checksums so users can verify a download is untampered.
      - name: Generate and publish SHA-256 checksums
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BUNDLE="frontend/src-tauri/target/${{ matrix.target }}/release/bundle"
          OUT="SHA256SUMS-${{ matrix.target }}.txt"
          : > "$OUT"
          hash() { if command -v sha256sum >/dev/null 2>&1; then sha256sum "$@"; else shasum -a 256 "$@"; fi; }
          while IFS= read -r f; do
            ( cd "$(dirname "$f")" && hash "$(basename "$f")" ) >> "$GITHUB_WORKSPACE/$OUT"
          done < <(find "$BUNDLE" \( -name '*.dmg' -o -name '*.pkg' -o -name '*-setup.exe' -o -name '*.msi' \) -type f)
          echo "----- $OUT -----"; cat "$OUT"
          gh release upload "${{ github.ref_name }}" "$OUT" --clobber

      # Cryptographically attest that these binaries were built from this
      # public source by this CI run (SLSA provenance, verifiable via
      # `gh attestation verify <file> --repo soundrich-bot/laybacker`).
      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            frontend/src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
            frontend/src-tauri/target/${{ matrix.target }}/release/bundle/macos/*.pkg
            frontend/src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*-setup.exe
            frontend/src-tauri/target/${{ matrix.target }}/release/bundle/msi/*.msi

      # Scan each installer with 70+ AV engines and append the report links to
      # the release notes. Self-skips until the VT_API_KEY secret is added.
      - name: Scan installers on VirusTotal
        if: ${{ env.VT_API_KEY != '' }}
        continue-on-error: true   # a VT hiccup must never fail/cancel a release
        uses: crazy-max/ghaction-virustotal@v4
        with:
          vt_api_key: ${{ env.VT_API_KEY }}
          update_release_body: false   # the finalize job sets notes race-free
          files: |
            frontend/src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
            frontend/src-tauri/target/${{ matrix.target }}/release/bundle/macos/*.pkg
            frontend/src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*-setup.exe
            frontend/src-tauri/target/${{ matrix.target }}/release/bundle/msi/*.msi

  # Once every platform has published, set the release notes once (race-free)
  # with deterministic VirusTotal report links built from the published
  # checksums, plus checksum and provenance instructions. continue-on-error so
  # it can never fail a release.
  finalize:
    needs: build
    if: ${{ always() }}
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history so we can build a changelog

      - name: Compose release notes + updater manifest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          TAG: ${{ github.ref_name }}
        run: |
          VER="${TAG#v}"
          TMP="$(mktemp -d)"

          # --- "What's new": commit subjects since the previous tag ---
          PREV="$(git describe --tags --abbrev=0 "${TAG}^" 2>/dev/null || true)"
          CHANGELOG=""
          if [ -n "$PREV" ]; then
            CHANGELOG="$(git log --no-merges --pretty='- %s' "${PREV}..${TAG}" \
              | grep -viE '^- (Release [0-9]|Bump version|Merge )' | head -25 || true)"
          fi
          [ -z "$CHANGELOG" ] && CHANGELOG="- Maintenance and improvements."

          # --- updater manifest (latest.json) from the signed .sig files ---
          gh release download "$TAG" --repo "$REPO" --dir "$TMP" --pattern "*.sig" || true
          PLATS='{}'
          for sig in "$TMP"/*.sig; do
            [ -e "$sig" ] || continue
            base="$(basename "$sig" .sig)"
            case "$base" in
              *aarch64.app.tar.gz) key=darwin-aarch64 ;;
              *x64.app.tar.gz)     key=darwin-x86_64 ;;
              *-setup.exe)         key=windows-x86_64 ;;
              *) continue ;;
            esac
            url="https://github.com/$REPO/releases/download/$TAG/$base"
            PLATS="$(echo "$PLATS" | jq --arg k "$key" --arg s "$(cat "$sig")" --arg u "$url" \
              '. + {($k): {signature:$s, url:$u}}')"
          done
          if [ "$PLATS" != '{}' ]; then
            jq -n --arg v "$VER" --arg n "$CHANGELOG" --arg d "$(date -u +%Y-%m-%dT%H:%M:%SZ)" --argjson p "$PLATS" \
              '{version:$v, notes:$n, pub_date:$d, platforms:$p}' > "$TMP/latest.json"
            echo "----- latest.json -----"; cat "$TMP/latest.json"
            gh release upload "$TAG" "$TMP/latest.json" --repo "$REPO" --clobber
          else
            echo "No .sig files found — skipping updater manifest."
          fi

          # --- release notes ---
          gh release download "$TAG" --repo "$REPO" --dir "$TMP" --pattern "SHA256SUMS-*.txt" || true
          cat "$TMP"/SHA256SUMS-*.txt > "$TMP/all.txt" 2>/dev/null || true
          {
            echo "## What's new"
            echo ""
            echo "$CHANGELOG"
            echo ""
            echo "## Install"
            echo "- **Mac (Apple Silicon, M1–M4)**: \`Laybacker_*_aarch64.pkg\`"
            echo "- **Mac (Intel)**: \`Laybacker_*_x64.pkg\`"
            echo "- **Windows**: \`Laybacker_*_x64-setup.exe\` (or the \`.msi\`)"
            echo ""
            echo "**First launch (Mac):** double-click the \`.pkg\`; if you see \"Apple could not verify…\", click Done, then **System Settings → Privacy & Security → Open Anyway**. After installing, Laybacker opens normally — and updates itself automatically from here on. **Windows:** *More info* → *Run anyway*."
            echo ""
            echo "## ✅ Independently verified safe"
            echo ""
            echo "Every installer was scanned by **VirusTotal (70+ antivirus engines)**:"
            echo ""
            while read -r hash file; do
              [ -z "$hash" ] && continue
              file="${file#\*}"
              echo "- [\`$file\`](https://www.virustotal.com/gui/file/$hash)"
            done < "$TMP/all.txt"
            echo ""
            echo "Confirm a download against the **\`SHA256SUMS-*.txt\`** files below; every binary also carries a **build-provenance attestation** — verify with \`gh attestation verify <file> --repo $REPO\`."
          } > "$TMP/notes.md"
          gh release edit "$TAG" --repo "$REPO" --notes-file "$TMP/notes.md"
