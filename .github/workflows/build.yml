name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write       # create the release and upload checksums
  id-token: write       # OIDC token for build-provenance signing
  attestations: write   # write the provenance attestation

jobs:
  build:
    strategy:
      # Don't let one target's failure cancel the others — each platform
      # builds and publishes independently.
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
          - platform: macos-latest
            target: x86_64-apple-darwin
          - platform: windows-latest
            target: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.platform }}

    # Exposed at job level so the VirusTotal step can self-skip until the
    # VT_API_KEY secret is added (a step `if:` can read env but not secrets).
    env:
      VT_API_KEY: ${{ secrets.VT_API_KEY }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install dependencies (Ubuntu)
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install

      - name: Fetch FFmpeg sidecars (macOS)
        if: runner.os == 'macOS'
        run: bash scripts/download-ffmpeg.sh

      - name: Fetch FFmpeg sidecars (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: bash scripts/download-ffmpeg.sh --windows

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: frontend
          tagName: ${{ github.ref_name }}
          releaseName: 'Laybacker ${{ github.ref_name }}'
          releaseBody: |
            Download the installer for your platform:
            - **Mac (Apple Silicon)**: `.dmg` file (aarch64)
            - **Mac (Intel)**: `.dmg` file (x86_64)
            - **Windows**: `.msi` installer

            **First time on Mac?** Right-click the app → Open → click Open again.
          releaseDraft: false
          prerelease: false
          tauriScript: npx tauri
          args: --target ${{ matrix.target }}

      # ── Independent trust artifacts ──────────────────────────────────────
      # Publish SHA-256 checksums so users can verify a download is untampered.
      - name: Generate and publish SHA-256 checksums
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BUNDLE="frontend/src-tauri/target/${{ matrix.target }}/release/bundle"
          OUT="SHA256SUMS-${{ matrix.target }}.txt"
          : > "$OUT"
          hash() { if command -v sha256sum >/dev/null 2>&1; then sha256sum "$@"; else shasum -a 256 "$@"; fi; }
          while IFS= read -r f; do
            ( cd "$(dirname "$f")" && hash "$(basename "$f")" ) >> "$GITHUB_WORKSPACE/$OUT"
          done < <(find "$BUNDLE" \( -name '*.dmg' -o -name '*-setup.exe' -o -name '*.msi' \) -type f)
          echo "----- $OUT -----"; cat "$OUT"
          gh release upload "${{ github.ref_name }}" "$OUT" --clobber

      # Cryptographically attest that these binaries were built from this
      # public source by this CI run (SLSA provenance, verifiable via
      # `gh attestation verify <file> --repo soundrich-bot/laybacker`).
      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            frontend/src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
            frontend/src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*-setup.exe
            frontend/src-tauri/target/${{ matrix.target }}/release/bundle/msi/*.msi

      # Scan each installer with 70+ AV engines and append the report links to
      # the release notes. Self-skips until the VT_API_KEY secret is added.
      - name: Scan installers on VirusTotal
        if: ${{ env.VT_API_KEY != '' }}
        continue-on-error: true   # a VT hiccup must never fail/cancel a release
        uses: crazy-max/ghaction-virustotal@v4
        with:
          vt_api_key: ${{ env.VT_API_KEY }}
          update_release_body: false   # the finalize job sets notes race-free
          files: |
            frontend/src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
            frontend/src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*-setup.exe
            frontend/src-tauri/target/${{ matrix.target }}/release/bundle/msi/*.msi

  # Once every platform has published, set the release notes once (race-free)
  # with deterministic VirusTotal report links built from the published
  # checksums, plus checksum and provenance instructions. continue-on-error so
  # it can never fail a release.
  finalize:
    needs: build
    if: ${{ always() }}
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Compose verified release notes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          TAG: ${{ github.ref_name }}
        run: |
          TMP="$(mktemp -d)"
          gh release download "$TAG" --repo "$REPO" --dir "$TMP" --pattern "SHA256SUMS-*.txt" || true
          cat "$TMP"/SHA256SUMS-*.txt > "$TMP/all.txt" 2>/dev/null || true
          {
            echo "Download the installer for your platform:"
            echo "- **Mac (Apple Silicon, M1–M4)**: \`Laybacker_*_aarch64.dmg\`"
            echo "- **Mac (Intel)**: \`Laybacker_*_x64.dmg\`"
            echo "- **Windows**: \`Laybacker_*_x64-setup.exe\` (or the \`.msi\`)"
            echo ""
            echo "**First launch?** Mac: right-click the app → Open → Open. Windows: *More info* → *Run anyway*."
            echo ""
            echo "## ✅ Independently verified safe"
            echo ""
            echo "Every installer was scanned by **VirusTotal (70+ antivirus engines)**:"
            echo ""
            while read -r hash file; do
              [ -z "$hash" ] && continue
              file="${file#\*}"
              echo "- [\`$file\`](https://www.virustotal.com/gui/file/$hash)"
            done < "$TMP/all.txt"
            echo ""
            echo "Confirm your download is untampered against the **\`SHA256SUMS-*.txt\`** files below. Every binary also carries a cryptographic **build-provenance attestation** — verify with:"
            echo '```'
            echo "gh attestation verify <file> --repo $REPO"
            echo '```'
          } > "$TMP/notes.md"
          gh release edit "$TAG" --repo "$REPO" --notes-file "$TMP/notes.md"
