# SonarCloud configuration.
# If SonarCloud assigns a different organization/project key when you import
# the repo, update the two values below to match.
sonar.organization=soundrich-bot
sonar.projectKey=soundrich-bot_laybacker
sonar.projectName=Laybacker

# Source code: Rust backend + Svelte/JS frontend
sonar.sources=frontend/src,frontend/src-tauri/src
sonar.tests=frontend/src-tauri/tests
sonar.sourceEncoding=UTF-8

# Test coverage (lcov from cargo-llvm-cov, written in the Quality workflow)
sonar.rust.lcov.reportPaths=frontend/src-tauri/lcov.info

# Don't analyze generated / build output
sonar.exclusions=frontend/dist/**,frontend/src-tauri/gen/**,frontend/src-tauri/target/**,docs/**
